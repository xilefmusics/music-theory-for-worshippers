<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer ring -->
    <circle cx="400" cy="400" r="290" stroke="#fff" stroke-width="3" />
  </g>

  <!-- Text labels -->
  <g fill="#fff" font-family="Arial, Helvetica, sans-serif">
    <!-- Outer (major) keys: C -> G -> D -> A -> E -> B -> F# -> Db -> Ab -> Eb -> Bb -> F -->
    <text x="400" y="80" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">C</text>
    <text x="560" y="123" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">G</text>
    <text x="677.1" y="240" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">D</text>
    <text x="720" y="400" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">A</text>
    <text x="677.1" y="560" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">E</text>
    <text x="560" y="677.1" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">B</text>
    <text x="400" y="720" font-size="22" text-anchor="middle" dominant-baseline="middle" font-weight="700">F#</text>
    <text x="240" y="677.1" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="700">Db</text>
    <text x="122.9" y="560" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="700">Ab</text>
    <text x="80" y="400" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="700">Eb</text>
    <text x="122.9" y="240" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="700">Bb</text>
    <text x="240" y="123" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="700">F</text>
  </g>
</svg>

