<svg xmlns="http://www.w3.org/2000/svg" viewBox="95 58 1344 245" width="1344" height="245" role="img" aria-label="Guitar fretboard diagram">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .board { fill: none; stroke: none; }
      .fret { stroke: #1f1f1f; stroke-width: 4; }
      .nut { stroke: #000000; stroke-width: 12; }
      .string { stroke: #111111; stroke-linecap: round; }
      .marker { fill: #9ca3af; opacity: 0.9; }
      .label { fill: #111111; font: 700 18px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .open-note { fill: #111111; font: 700 20px Arial, Helvetica, sans-serif; text-anchor: end; dominant-baseline: middle; }
      .title { fill: #000000; font: 700 28px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .chord-dot { fill: #f97316; stroke: #c2410c; stroke-width: 2; } /* I major */
      .chord-dot-red { fill: #e11d48; stroke: #9f1239; stroke-width: 2; } /* IV major */
      .chord-dot-yellow { fill: #facc15; stroke: #ca8a04; stroke-width: 2; } /* V major */
      .minor-dot-1 { fill: #14b8a6; stroke: #0f766e; stroke-width: 2; } /* ii minor */
      .minor-dot-2 { fill: #3b82f6; stroke: #1d4ed8; stroke-width: 2; } /* iii minor */
      .minor-dot-3 { fill: #a855f7; stroke: #6d28d9; stroke-width: 2; } /* vi minor */
      .minor-dot-4 { fill: #9ca3af; stroke: #4b5563; stroke-width: 2; } /* vii dim */
      .shape-line { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .shape-line-orange { stroke: #c2410c; }
      .shape-line-red { stroke: #9f1239; }
      .shape-line-yellow { stroke: #ca8a04; }
      .shape-line-minor-1 { stroke: #0f766e; }
      .shape-line-minor-2 { stroke: #1d4ed8; }
      .shape-line-minor-3 { stroke: #6d28d9; }
      .shape-line-minor-4 { stroke: #4b5563; }
      .degree-label { font: 700 22px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .degree-i { fill: #c2410c; }
      .degree-iim { fill: #0f766e; }
      .degree-iiim { fill: #1d4ed8; }
      .degree-iv { fill: #9f1239; }
      .degree-v { fill: #ca8a04; }
      .degree-vim { fill: #6d28d9; }
      .degree-viidim { fill: #4b5563; }
      .half-opacity { opacity: 0.5; }
      .finger-label { fill: #ffffff; font: 700 11px Arial, Helvetica, sans-serif; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
    </style>
  </defs>

  <rect class="bg" x="95" y="58" width="1344" height="245" rx="16"/>
  <!-- Degree labels -->
  <text class="degree-label degree-i" x="265" y="80">1</text>
  <text class="degree-label degree-iim" x="445" y="80">2m</text>
  <text class="degree-label degree-iiim" x="625" y="80">3m</text>
  <text class="degree-label degree-iv" x="715" y="80">4</text>
  <text class="degree-label degree-v" x="895" y="80">5</text>
  <text class="degree-label degree-vim" x="1075" y="80">6m</text>
  <text class="degree-label degree-viidim half-opacity" x="1255" y="80">7dim</text>
  <text class="degree-label degree-i half-opacity" x="1345" y="80">1</text>
  <!-- Fretboard -->
  <rect class="board" x="110" y="70" width="1330" height="220"/>

  <!-- Frets (0-14) -->
  <line class="nut" x1="130" y1="95" x2="130" y2="270"/>
  <line class="fret" x1="220" y1="95" x2="220" y2="270"/>
  <line class="fret" x1="310" y1="95" x2="310" y2="270"/>
  <line class="fret" x1="400" y1="95" x2="400" y2="270"/>
  <line class="fret" x1="490" y1="95" x2="490" y2="270"/>
  <line class="fret" x1="580" y1="95" x2="580" y2="270"/>
  <line class="fret" x1="670" y1="95" x2="670" y2="270"/>
  <line class="fret" x1="760" y1="95" x2="760" y2="270"/>
  <line class="fret" x1="850" y1="95" x2="850" y2="270"/>
  <line class="fret" x1="940" y1="95" x2="940" y2="270"/>
  <line class="fret" x1="1030" y1="95" x2="1030" y2="270"/>
  <line class="fret" x1="1120" y1="95" x2="1120" y2="270"/>
  <line class="fret" x1="1210" y1="95" x2="1210" y2="270"/>
  <line class="fret" x1="1300" y1="95" x2="1300" y2="270"/>
  <line class="fret" x1="1390" y1="95" x2="1390" y2="270"/>

  <!-- Strings (low E to high e) -->
  <line class="string" x1="130" y1="95" x2="1430" y2="95" style="stroke-width:4"/>
  <line class="string" x1="130" y1="130" x2="1430" y2="130" style="stroke-width:4"/>
  <line class="string" x1="130" y1="165" x2="1430" y2="165" style="stroke-width:4"/>
  <line class="string" x1="130" y1="200" x2="1430" y2="200" style="stroke-width:4"/>
  <line class="string" x1="130" y1="235" x2="1430" y2="235" style="stroke-width:4"/>
  <line class="string" x1="130" y1="270" x2="1430" y2="270" style="stroke-width:4"/>

  <!-- Inlay markers -->
  <circle class="marker" cx="355" cy="182" r="13"/>
  <circle class="marker" cx="535" cy="182" r="13"/>
  <circle class="marker" cx="715" cy="182" r="13"/>
  <circle class="marker" cx="895" cy="182" r="13"/>
  <circle class="marker" cx="1165" cy="150" r="13"/>
  <circle class="marker" cx="1165" cy="214" r="13"/>

  <!-- Chord shapes (rendered last to stay on top) -->
  <!-- Base E shape chord (open E major fingering: A2, D2, G1) -->
  <polyline class="shape-line shape-line-orange" points="265,235 265,200 175,165"/>
  <circle class="chord-dot" cx="265" cy="235" r="12"/>
  <circle class="chord-dot" cx="265" cy="200" r="12"/>
  <circle class="chord-dot" cx="175" cy="165" r="12"/>
  <text class="finger-label" x="265" y="235">4</text>
  <text class="finger-label" x="265" y="200">5</text>
  <text class="finger-label" x="175" y="165">3</text>
  <!-- E shape chord moved up 5 frets -->
  <polyline class="shape-line shape-line-red" points="715,235 715,200 625,165"/>
  <circle class="chord-dot-red" cx="715" cy="235" r="12"/>
  <circle class="chord-dot-red" cx="715" cy="200" r="12"/>
  <circle class="chord-dot-red" cx="625" cy="165" r="12"/>
  <text class="finger-label" x="715" y="235">4</text>
  <text class="finger-label" x="715" y="200">5</text>
  <text class="finger-label" x="625" y="165">3</text>
  <!-- E shape chord moved up 2 frets -->
  <polyline class="shape-line shape-line-minor-1" points="445,235 445,200 265,165"/>
  <circle class="minor-dot-1" cx="445" cy="235" r="12"/>
  <circle class="minor-dot-1" cx="445" cy="200" r="12"/>
  <circle class="minor-dot-1" cx="265" cy="165" r="12"/>
  <text class="finger-label" x="445" y="235">4</text>
  <text class="finger-label" x="445" y="200">5</text>
  <text class="finger-label" x="265" y="165">2</text>
  <!-- E shape chord moved up 4 frets -->
  <polyline class="shape-line shape-line-minor-2" points="625,235 625,200 445,165"/>
  <circle class="minor-dot-2" cx="625" cy="235" r="12"/>
  <circle class="minor-dot-2" cx="625" cy="200" r="12"/>
  <circle class="minor-dot-2" cx="445" cy="165" r="12"/>
  <text class="finger-label" x="625" y="235">4</text>
  <text class="finger-label" x="625" y="200">5</text>
  <text class="finger-label" x="445" y="165">2</text>
  <!-- E shape chord moved up 7 frets -->
  <polyline class="shape-line shape-line-yellow" points="895,235 895,200 805,165"/>
  <circle class="chord-dot-yellow" cx="895" cy="235" r="12"/>
  <circle class="chord-dot-yellow" cx="895" cy="200" r="12"/>
  <circle class="chord-dot-yellow" cx="805" cy="165" r="12"/>
  <text class="finger-label" x="895" y="235">4</text>
  <text class="finger-label" x="895" y="200">5</text>
  <text class="finger-label" x="805" y="165">3</text>
  <!-- C# minor shape (A11, D11, G9) -->
  <polyline class="shape-line shape-line-minor-3" points="1075,235 1075,200 895,165"/>
  <circle class="minor-dot-3" cx="1075" cy="235" r="12"/>
  <circle class="minor-dot-3" cx="1075" cy="200" r="12"/>
  <circle class="minor-dot-3" cx="895" cy="165" r="12"/>
  <text class="finger-label" x="1075" y="235">4</text>
  <text class="finger-label" x="1075" y="200">5</text>
  <text class="finger-label" x="895" y="165">2</text>
  <!-- Diminished shape in 11th-13th fret area (A12, D13, G11) -->
  <polyline class="shape-line shape-line-minor-4 half-opacity" points="1165,235 1255,200 1075,165"/>
  <circle class="minor-dot-4 half-opacity" cx="1165" cy="235" r="12"/>
  <circle class="minor-dot-4 half-opacity" cx="1255" cy="200" r="12"/>
  <circle class="minor-dot-4 half-opacity" cx="1075" cy="165" r="12"/>
  <text class="finger-label half-opacity" x="1165" y="235">4</text>
  <text class="finger-label half-opacity" x="1255" y="200">5</text>
  <text class="finger-label half-opacity" x="1075" y="165">2</text>
  <!-- E shape chord moved up 14 frets -->
  <polyline class="shape-line shape-line-orange half-opacity" points="1345,235 1345,200 1255,165"/>
  <circle class="chord-dot half-opacity" cx="1345" cy="235" r="12"/>
  <circle class="chord-dot half-opacity" cx="1345" cy="200" r="12"/>
  <circle class="chord-dot half-opacity" cx="1255" cy="165" r="12"/>
  <text class="finger-label half-opacity" x="1345" y="235">4</text>
  <text class="finger-label half-opacity" x="1345" y="200">5</text>
  <text class="finger-label half-opacity" x="1255" y="165">3</text>

  <!-- Fret numbers -->
  <text class="label" x="130" y="293">0</text>
  <text class="label" x="175" y="293">1</text>
  <text class="label" x="265" y="293">2</text>
  <text class="label" x="355" y="293">3</text>
  <text class="label" x="445" y="293">4</text>
  <text class="label" x="535" y="293">5</text>
  <text class="label" x="625" y="293">6</text>
  <text class="label" x="715" y="293">7</text>
  <text class="label" x="805" y="293">8</text>
  <text class="label" x="895" y="293">9</text>
  <text class="label" x="985" y="293">10</text>
  <text class="label" x="1075" y="293">11</text>
  <text class="label" x="1165" y="293">12</text>
  <text class="label" x="1255" y="293">13</text>
  <text class="label" x="1345" y="293">14</text>

  <!-- Open string tuning labels -->
  <text class="open-note" x="113" y="95">e</text>
  <text class="open-note" x="113" y="130">B</text>
  <text class="open-note" x="113" y="165">G</text>
  <text class="open-note" x="113" y="200">D</text>
  <text class="open-note" x="113" y="235">A</text>
  <text class="open-note" x="113" y="270">E</text>
</svg>
